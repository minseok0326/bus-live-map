<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>카카오맵 테스트</title>
    <style>
        /* 화면 기본 여백 없애기 */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        
        /* 지도를 화면에 꽉 차게 설정 */
        #map {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=01d103e1fba65540688cdac2e1f901b1"></script>
    <script>
        var container = document.getElementById('map');
        
        // 여의도 중심 좌표 설정
        var options = {
            center: new kakao.maps.LatLng(37.521715, 126.924290), 
            level: 4 // 확대 레벨
        };

        // 지도 생성
        var map = new kakao.maps.Map(container, options);
    </script>
</body>
</html>
