<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Kakao 지도 시작하기</title>
    <style>
        /* 1. 브라우저의 기본 여백을 없앱니다 */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        
        /* 2. 지도를 담는 박스의 크기를 화면에 꽉 차게(100%) 설정합니다 */
        #map {
            width: 100%;
            height: 100vh; /* vh는 화면 전체 높이를 의미합니다 */
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=548e247860bf966abd23bcd80ec18c19"></script>
    <script>
        var container = document.getElementById('map');
        var options = {
            center: new kakao.maps.LatLng(37.521715, 126.924290), // 여의도 좌표
            level: 3
        };

        var map = new kakao.maps.Map(container, options);
    </script>
</body>
</html>
